name: Lint workflow
on:
  workflow_call:
    inputs: []

jobs:
  lint:
    name: Lint
    steps:
      - name: Lint
        run: |
          cargo clippy --locked --release --all-features --all-targets -- -D clippy::all
      - name: Lint
        run: |
          deno lint
      - name: Lint
        run: |
          tools/copyright_checker.js
