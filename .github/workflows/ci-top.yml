name: CI top-level
on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

jobs:
  lint:
    name: Top-level
    runs-on: ${{ inputs.os }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Install Deno
        uses: denoland/setup-deno@v1

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Rust (nightly)
        if: contains(inputs.os, 'ubuntu')
        uses: dtolnay/rust-toolchain@nightly

      - name: Clean
        if: github.ref == 'refs/heads/main'
        run: cargo clean

      - name: Format
        if: contains(inputs.os, 'ubuntu')
        run: |
          cargo fmt -- --check
          deno fmt --check ./core/ ./ops/ ./serde_v8/

      - name: Lint
        if: contains(inputs.os, 'ubuntu')
        id: lint
        uses: ./.github/workflows/ci-lint

      - name: Lint deps
        if: contains(inputs.os, 'ubuntu')
        run: |
          cargo install cargo-machete --locked
          cargo machete
          cargo install cargo-udeps --locked
          cargo +nightly udeps

      - name: Cargo test
        run: cargo test --locked --release --all-features --bins --tests --examples && cargo test --doc

      - name: Cargo test (miri)
        if: contains(inputs.os, 'ubuntu')
        run: |
          # Install and run miri tests
          rustup component add --toolchain nightly miri
          # This somehow prints errors in CI that don't show up locally
          RUSTFLAGS=-Awarnings cargo +nightly miri test -p deno_core

      - name: Run examples
        # Only regression tests here for now.
        # Regression test for https://github.com/denoland/deno/pull/19615.
        run: |-
          cargo run -p deno_core --example op2
          cargo run -p deno_core --example op2 --features include_js_files_for_snapshotting

      - name: Cargo publish
        if: |
          contains(inputs.os, 'ubuntu') &&
          github.repository == 'denoland/deno_core' &&
          startsWith(github.ref, 'refs/tags/')
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p serde_v8 && cargo publish -p deno_ops && cargo publish -p deno_core

      - name: Get tag version
        if: contains(inputs.os, 'ubuntu') && startsWith(github.ref, 'refs/tags/')
        id: get_tag_version
        run: echo ::set-output name=TAG_VERSION::${GITHUB_REF/refs\/tags\//}

    env:
      CARGO_INCREMENTAL: 0
      GH_ACTIONS: 1
      RUST_BACKTRACE: full
      RUSTFLAGS: -D warnings
