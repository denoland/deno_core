name: CI
on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      job:
        required: true
        type: string

jobs:
  lint:
    name: ${{ inputs.job }}
    runs-on: ${{ inputs.os }}
    steps:
      - run: echo ${{ inputs.job }}

      - name: Clone repository
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Install Deno
        uses: denoland/setup-deno@v1

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Rust (nightly)
        if: contains(inputs.os, 'ubuntu')
        uses: dtolnay/rust-toolchain@nightly

      - name: Clean
        if: github.ref == 'refs/heads/main'
        run: cargo clean

      - name: Lint
        id: lint
        if: inputs.job == 'lint'
        uses: ./.github/workflows/ci-lint

      - name: Test
        id: test
        if: inputs.job == 'test'
        uses: ./.github/workflows/ci-test
      - name: Cargo publish
        if: |
          contains(inputs.os, 'ubuntu') &&
          github.repository == 'denoland/deno_core' &&
          startsWith(github.ref, 'refs/tags/')
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p serde_v8 && cargo publish -p deno_ops && cargo publish -p deno_core

      - name: Get tag version
        if: contains(inputs.os, 'ubuntu') && startsWith(github.ref, 'refs/tags/')
        id: get_tag_version
        run: echo ::set-output name=TAG_VERSION::${GITHUB_REF/refs\/tags\//}

    env:
      CARGO_INCREMENTAL: 0
      GH_ACTIONS: 1
      RUST_BACKTRACE: full
      RUSTFLAGS: -D warnings
